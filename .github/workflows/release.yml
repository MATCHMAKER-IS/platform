name: Release (build & push image)

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  APP_IMAGE: ghcr.io/${{ github.repository }}/internal-app
  MIGRATE_IMAGE: ghcr.io/${{ github.repository }}/internal-app-migrate

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3

      - name: Metadata (app)
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.APP_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      - name: Build & push app
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/internal-app/Dockerfile
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push migrator
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/internal-app/Dockerfile.migrate
          push: true
          tags: ${{ env.MIGRATE_IMAGE }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max
