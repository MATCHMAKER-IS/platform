# AWS Amplify Hosting のビルド定義。
#
# 【何をデプロイするか】
# 統合デモサイト(demos/showcase)。DB を持たないので Amplify だけで完結する。
# RDS などのバックエンドは不要。
#
# 【Amplify コンソール側の設定】
# 1. リポジトリを接続するとき「モノレポ」を選ぶ
# 2. App root(モノレポのルートディレクトリ)に `demos/showcase` を指定
#
# ────────────────────────────────────────────────
# 【ここまでに踏んだ地雷(同じ失敗を繰り返さないために残す)】
#
# 1. `cd ../.. && pnpm --filter showcase-demo build`
#    → Next.js がモノレポのルートで動き、相対 import も node_modules も解決できず
#      Module not found が 103 件
#
# 2. preBuild で `cd ../..`、build で `pnpm build`
#    → **Amplify は preBuild と build を同じシェルで実行する**ので cd が残り、
#      ルートの `pnpm build`(= `turbo run build`)が全 107 パッケージをビルドして失敗
#
# 3. `cd "$AMPLIFY_APP_ROOT"`
#    → **環境変数が空**だった(このバージョンの Amplify では提供されない)。
#      `cd ""` で `/` へ移動し、`No package found in this workspace`
#
# 4. `pnpm install --frozen-lockfile`(pnpm 既定の isolated linker)
#    → **ビルドは成功するのにデプロイで落ちる**:
#      `CustomerError: The 'node_modules' folder is missing the 'next' dependency`
#      Amplify の Lambda ランタイムは node_modules が「実ディレクトリ」である前提。
#      pnpm 既定は .pnpm/ へのシンボリックリンク農場を作るので解決できない。
#      → install 時だけ `--node-linker=hoisted` を付ける(.npmrc は触らない)
#
# 【対策】
# - install はルートで行う(workspace 全体の解決に必要)
# - build は **リポジトリのルートからの相対パスで cd し直す**。
#   preBuild の cd が残っている前提なので、これで確実に demos/showcase に居られる。
# - `pwd` を出して、ログで実行場所を確認できるようにする
# ────────────────────────────────────────────────
version: 1
applications:
  - appRoot: demos/showcase
    frontend:
      phases:
        preBuild:
          commands:
            # pnpm を有効にする(Amplify の既定イメージには入っていない)
            - corepack enable
            - corepack prepare pnpm@9.15.0 --activate
            # ここで cd ../.. すると、build にも残る(それを前提に build を書く)
            #
            # --node-linker=hoisted は **Amplify のためだけ** に付けている。
            # .npmrc には書かないこと。あそこは「各パッケージが宣言した依存だけを使う」
            # (= 隠れ依存を防ぐ)ための設定で、基盤の設計思想そのもの。
            # hoisted を .npmrc に書くとローカルと CI でも隠れ依存が通るようになり、
            # check-deps / check-showcase-deps が守っているものが足元から崩れる。
            # Amplify のパッケージング要求は、ここだけで満たせば足りる。
            - cd ../.. && pnpm install --frozen-lockfile --node-linker=hoisted
        build:
          commands:
            # preBuild の cd でモノレポのルートに居る。そこから appRoot へ入り直す。
            # 1 コマンドにまとめるので、cd と build が必ずセットで効く。
            # package.json の build スクリプト(= next build)を使う
            - pwd && cd demos/showcase && pwd && pnpm run build
      artifacts:
        # artifacts は appRoot からの相対(Amplify が解決する)
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          # node_modules はキャッシュしない。
          # isolated 構造で作られた古いキャッシュが復元されると、hoisted 指定が
          # 効かず上記 4 の症状が再発する。install は 50 秒程度なので割に合わない。
          - .next/cache/**/*
