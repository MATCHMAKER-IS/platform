# AWS Amplify Hosting のビルド定義。
#
# 【何をデプロイするか】
# 統合デモサイト(demos/showcase)。DB を持たないので Amplify だけで完結する。
# RDS などのバックエンドは不要。
#
# 【Amplify コンソール側の設定】
# 1. リポジトリを接続するとき「モノレポ」を選ぶ
# 2. App root(モノレポのルートディレクトリ)に `demos/showcase` を指定
#    → 以降のコマンドは demos/showcase で実行される
#
# 【重要】build は demos/showcase で実行する
# `cd ../.. && pnpm --filter showcase-demo build` にすると、Next.js が
# **モノレポのルートで動いてしまい**、相対 import も node_modules も解決できない
# (Turbopack が ./demos/showcase/... を基準にしてしまう)。
# install だけルートで行い、build は appRoot のまま実行する。
version: 1
applications:
  - appRoot: demos/showcase
    frontend:
      phases:
        preBuild:
          commands:
            # pnpm を有効にする(Amplify の既定イメージには入っていない)
            - corepack enable
            - corepack prepare pnpm@9.15.0 --activate
            # install だけはルートで(workspace 全体の解決に必要)
            - cd ../.. && pnpm install --frozen-lockfile
        build:
          commands:
            # ここは demos/showcase(appRoot)のまま実行する
            - pnpm build
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
