# AWS Amplify Hosting のビルド定義。
#
# 【何をデプロイするか】
# 統合デモサイト(demos/showcase)。DB を持たないので Amplify だけで完結する。
# RDS などのバックエンドは不要。
#
# 【Amplify コンソール側の設定】
# 1. リポジトリを接続するとき「モノレポ」を選ぶ
# 2. App root(モノレポのルートディレクトリ)に `demos/showcase` を指定
#
# 【重要】phase をまたいで cd が残る
# Amplify は preBuild と build を **同じシェル**で実行する。preBuild で `cd ../..` すると
# build もモノレポのルートで走り、ルートの `pnpm build`(= `turbo run build`)が
# **全 107 パッケージをビルド**してしまう(実際にテストファイルの型エラーで失敗した)。
#
# 対策: **絶対パスで移動する**($AMPLIFY_APP_ROOT / $AMPLIFY_MONOREPO_APP_ROOT は
# Amplify が用意する環境変数)。サブシェルより確実。
version: 1
applications:
  - appRoot: demos/showcase
    frontend:
      phases:
        preBuild:
          commands:
            # pnpm を有効にする(Amplify の既定イメージには入っていない)
            - corepack enable
            - corepack prepare pnpm@9.15.0 --activate
            # install はモノレポのルートで行う(workspace 全体の解決に必要)
            - cd "$AMPLIFY_APP_ROOT" && pnpm install --frozen-lockfile
        build:
          commands:
            # ルートに居るので、明示的に appRoot へ移動してからビルドする
            - cd "$AMPLIFY_APP_ROOT/$AMPLIFY_MONOREPO_APP_ROOT"
            - pwd   # ログで実行場所を確認できるように
            - pnpm exec next build
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
